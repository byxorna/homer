name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

  workflow_dispatch:

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: changelog
        uses: scottbrenner/generate-changelog-action@v1.3.3
        id: changelog
        env:
          REPO: ${{ github.repository }}

      - name: Create Release
        id: create_release
        uses: actions/create-release@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

  build:
    needs: create_release
    strategy:
      matrix:
        include:
          - arch: amd64
            os: linux
            go_version: "1.26"
          - arch: arm64
            os: linux
            go_version: "1.26"
          - arch: arm64
            os: darwin
            go_version: "1.26"
          - arch: amd64
            os: darwin
            go_version: "1.26"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go_version }} for ${{ matrix.os }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Build
        run: make clean all GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: homer-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            bin/homer-client
            bin/homer-server

      - name: Attach artifacts to release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.ref.replace("refs/tags/", "");
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag
            });
            for (const bin of ["homer-client", "homer-server"]) {
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: `${bin}-${{ matrix.os }}-${{ matrix.arch }}`,
                data: await fs.readFileSync(`bin/${bin}`)
              });
            }
